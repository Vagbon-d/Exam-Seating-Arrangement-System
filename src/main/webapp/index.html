<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ExamSeater</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            background-color: #f4f7f6;
            color: #333;
        }
        .split-left {
            flex: 1;
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 40px;
            text-align: center;
        }
        .split-left h1 {
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 20px;
        }
        .split-left p {
            font-size: 18px;
            font-weight: 300;
            opacity: 0.8;
            max-width: 400px;
            line-height: 1.6;
        }
        .split-right {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: white;
        }
        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 40px;
        }
        .login-container h2 {
            font-size: 32px;
            margin-bottom: 10px;
            color: #111;
        }
        .login-container p {
            color: #666;
            margin-bottom: 40px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.3s;
        }
        .input-group input:focus {
            outline: none;
            border-color: #2c5364;
        }

        button {
            width: 100%;
            padding: 16px;
            background: #2c5364;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
        }
        button:hover {
            background: #1e3a47;
            transform: translateY(-1px);
        }
        
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }
            .split-left {
                flex: none;
                padding: 60px 20px;
            }
        }
    </style>
</head>
<body>

<div class="split-left">
    <h1>ExamSeater</h1>
    <p>The solution for automated, efficient, and secure classroom seating arrangements.</p>
</div>

<div class="split-right">
    <div class="login-container">
        <h2>Welcome Back</h2>
        <p>Please enter your admin credentials to continue.</p>
        
        <form action="LoginServlet" method="POST">
            <div class="input-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="admin" required>
            </div>
            
            <div class="input-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            

            <button type="submit">Sign In to Dashboard</button>
            <div style="text-align:center; margin-top: 20px; font-size: 14px; color: #555;">
                Don't have an account? <a href="signup.html" style="color: #2c5364; font-weight: 600; text-decoration: none;">Sign Up</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
